{% extends 'base.html' %}

{% block title %}Register - Pramod General Store{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-8 bg-[#F5E6CA]/60 border-2 border-[#4E342E]/20 rounded-2xl p-8 shadow-xl relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-[#C65D2E] to-[#E5A93B]"></div>
    
    <div class="text-center space-y-2 mb-6">
        <div class="inline-flex h-12 w-12 rounded-full bg-[#2E7D32] border border-[#E5A93B] items-center justify-center text-white text-xl shadow-md">
            ✍️
        </div>
        <h3 class="text-xl font-serif font-bold text-[#4E342E] uppercase">Create New Account</h3>
        <p class="text-xs text-slate-500 font-semibold">Join the digital community of Pramod General Store.</p>
    </div>

    <form action="/register" method="POST" class="space-y-4 text-xs font-semibold">
        <div>
            <label for="username" class="block text-[10px] font-bold text-[#4E342E]/80 uppercase tracking-wider mb-1">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username" class="w-full px-3.5 py-2.5 bg-white border border-[#4E342E]/10 rounded-xl focus:outline-none focus:border-[#C65D2E] text-slate-700 text-xs">
        </div>

        <div>
            <label for="password" class="block text-[10px] font-bold text-[#4E342E]/80 uppercase tracking-wider mb-1">Password</label>
            <input type="password" id="password" name="password" required placeholder="Choose a password" class="w-full px-3.5 py-2.5 bg-white border border-[#4E342E]/10 rounded-xl focus:outline-none focus:border-[#C65D2E] text-slate-700 text-xs">
        </div>

        <div>
            <label for="name" class="block text-[10px] font-bold text-[#4E342E]/80 uppercase tracking-wider mb-1">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name" class="w-full px-3.5 py-2.5 bg-white border border-[#4E342E]/10 rounded-xl focus:outline-none focus:border-[#C65D2E] text-slate-700 text-xs">
        </div>

        <div>
            <label for="mobile" class="block text-[10px] font-bold text-[#4E342E]/80 uppercase tracking-wider mb-1">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" required placeholder="e.g. 9876501101" class="w-full px-3.5 py-2.5 bg-white border border-[#4E342E]/10 rounded-xl focus:outline-none focus:border-[#C65D2E] text-slate-700 text-xs">
        </div>

        <div>
            <label for="role" class="block text-[10px] font-bold text-[#4E342E]/80 uppercase tracking-wider mb-1">Account Type (Role)</label>
            <select id="role" name="role" class="w-full px-3.5 py-2.5 bg-white border border-[#4E342E]/10 rounded-xl focus:outline-none focus:border-[#C65D2E] text-slate-700 text-xs">
                <option value="Customer">Customer (Personal Bazar and Ledger)</option>
                <option value="Clerk">Clerk (Store helper and entry manager)</option>
                <option value="Delivery Boy">Delivery Boy (Shipping agent)</option>
                <option value="Owner">Owner (Full administrative rights)</option>
            </select>
        </div>

        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-[#2E7D32] to-[#1B5E20] text-[#F5E6CA] font-extrabold rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-md shadow-green-950/20 uppercase tracking-wider text-xs">
            Submit Registration
        </button>
    </form>

    <div class="border-t border-[#4E342E]/10 mt-6 pt-4 text-center text-xs">
        <span class="text-slate-500">Already registered? </span>
        <a href="/login" class="text-[#C65D2E] font-bold hover:underline">Log In Here</a>
    </div>
</div>
{% endblock %}
